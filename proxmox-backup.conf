###############################################################################
# proxmox-backup.conf — Configuration for proxmox-backup.sh
###############################################################################

# ─── NAS Mount Point ─────────────────────────────────────────────────────────
# Mount your NAS (NFS/SMB/CIFS) to this path before running backups.
# The script will create subdirectories: daily/, weekly/, monthly/
BACKUP_BASE="/mnt/nas-backup/proxmox"

# ─── GFS Retention ───────────────────────────────────────────────────────────
# When using VZDUMP_STORAGE: VM backup retention is managed by the Proxmox
# storage's prune-backups setting (configured automatically by the installer).
# The GFS settings below still control host config backup rotation.
GFS_DAILY_KEEP=7         # Number of daily backups to keep
GFS_WEEKLY_KEEP=4         # Number of weekly backups to keep
GFS_MONTHLY_KEEP=6        # Number of monthly backups to keep
GFS_WEEKLY_DAY=7          # Day of week for weekly backup (1=Mon .. 7=Sun)

# ─── vzdump Settings ─────────────────────────────────────────────────────────
# Use a named Proxmox storage for VM backups (e.g., "unraid").
# When set, backups use --storage and appear in the Proxmox UI for easy restore.
# When empty, backups use --dumpdir and are written to BACKUP_BASE/vm-backups/.
VZDUMP_STORAGE=""

VZDUMP_MODE="snapshot"    # snapshot | suspend | stop
VZDUMP_COMPRESS="zstd"    # zstd | gzip | lzo | none
VZDUMP_PIGZ=4             # Compression threads
VZDUMP_BWLIMIT=0          # KB/s bandwidth limit (0 = unlimited)
VZDUMP_TMPDIR=""           # Temp directory for vzdump (empty = system default)
VZDUMP_EXTRA_ARGS=""       # Additional vzdump arguments (e.g., "--notes-template '{{guestname}}'")

# ─── Exclude VMs ─────────────────────────────────────────────────────────────
# Space-separated VMIDs to skip (e.g., test VMs, templates)
EXCLUDE_VMIDS=""

# ─── Notifications ───────────────────────────────────────────────────────────
NOTIFY_EMAIL=""            # Email for notifications (empty = disabled)
LOG_FILE="/var/log/proxmox-backup.log"

# ─── Ansible Config Harvest ──────────────────────────────────────────────────
# The harvester generates an Ansible vars file from the running host config.
# This file is stored alongside each backup so you can rebuild from any point.
HARVEST_ENABLED=true
