---
# Ansible inventory for Proxmox host recovery
#
# Edit the ansible_host to match your Proxmox server's IP address.
# For recovery: point this at the fresh Debian/Proxmox install.

all:
  children:
    proxmox:
      hosts:
        pve:
          ansible_host: 192.168.1.100      # ← Change to your PVE host IP
          ansible_user: root
          ansible_port: 22
          # ansible_ssh_private_key_file: ~/.ssh/id_ed25519

          # NAS mount for restoring VM backups
          nas_backup_path: /mnt/nas-backup/proxmox

          # NAS connection details (for auto-mounting during recovery)
          nas_nfs_server: "nas.local"       # ← Change to your NAS IP/hostname
          nas_nfs_export: "/backups"        # ← Change to your NFS export path
          # For SMB/CIFS instead of NFS:
          # nas_cifs_share: "//nas.local/backups"
          # nas_cifs_user: "backup"
          # nas_cifs_password: "changeme"
